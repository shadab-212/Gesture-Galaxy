<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Galaxy — AI Planet</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
</head>
<body>

  <canvas id="galaxy-canvas"></canvas>

  <video id="webcam" autoplay playsinline muted
         style="position:fixed;bottom:12px;right:12px;width:160px;height:120px;
                border-radius:8px;border:1px solid rgba(255,255,255,0.15);
                object-fit:cover;opacity:0.7;z-index:10;display:none;"></video>
  <canvas id="landmark-canvas" style="position:fixed;bottom:12px;right:180px;width:160px;height:120px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);display:none;z-index:10;"></canvas>

  <div id="ui-overlay">

    <div id="ui-header">
      <span class="ui-logo">✦ GESTURE GALAXY</span>
      <span class="ui-sub">AI · WebGL · MediaPipe</span>
    </div>

    <div id="stats-panel">
      <div class="stat-row">
        <span class="stat-label">FPS</span>
        <span class="stat-value" id="fps-value">--</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">QUALITY</span>
        <span class="stat-value" id="quality-label">HIGH</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">GESTURE</span>
        <span class="stat-value gesture" id="gesture-label">Idle</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">CONF</span>
        <span class="stat-value" id="confidence-value">--</span>
      </div>
    </div>

    <div id="controls">
      <button id="btn-audio" class="ctrl-btn">🔊 Audio OFF</button>
      <button id="btn-quality" class="ctrl-btn active">⚡ Adaptive ON</button>
      <button id="btn-camera" class="ctrl-btn">📷 Gesture OFF</button>
      <button id="btn-mic" class="ctrl-btn">🎤 Mic</button>
      <button id="btn-file" class="ctrl-btn">📁 File</button>
      <input type="file" id="audio-file-input" style="display:none;" accept="audio/*">
    </div>

    <div id="audio-controls" style="position:absolute;bottom:24px;right:20px;display:none;flex-direction:column;gap:8px;align-items:center;">
      <div style="display:flex;gap:4px;align-items:flex-end;">
        <div id="bar-bass" style="width:8px;height:4px;background:#ff2fa8;border-radius:2px;"></div>
        <div id="bar-mid" style="width:8px;height:4px;background:#00cfff;border-radius:2px;"></div>
        <div id="bar-treble" style="width:8px;height:4px;background:#00ff99;border-radius:2px;"></div>
      </div>
      <div style="font-size:0.59rem;color:var(--text-dim);letter-spacing:0.1em;">AUDIO</div>
    </div>

    <div id="status-panel" style="position:absolute;bottom:24px;left:20px;display:flex;flex-direction:column;gap:6px;font-size:0.58rem;color:var(--text-dim);letter-spacing:0.08em;">
      <div id="status-mediapipe">● MediaPipe: Ready</div>
      <div id="status-tf">● TF.js: Ready</div>
      <div id="status-audio">● Audio: Off</div>
      <div><span id="confidence-bar" style="display:inline-block;width:40px;height:4px;background:var(--accent);border-radius:2px;vertical-align:middle;"></span>&nbsp;<span id="confidence-value">0.00</span></div>
    </div>

    <div id="gesture-legend">
      <div class="legend-title">GESTURE MAP</div>
      <div class="legend-item"><span class="badge">✋</span> Open Hand → Scale Up</div>
      <div class="legend-item"><span class="badge">✊</span> Fist → Scale Down</div>
      <div class="legend-item"><span class="badge">🤌</span> Pinch → Slow Spin</div>
      <div class="legend-item"><span class="badge">🔄</span> Rotate → Fast Spin</div>
      <div class="legend-item"><span class="badge">🔍</span> Zoom → Zoom In</div>
    </div>

    <div id="loading-screen">
      <div id="loading-inner">
        <div class="load-ring"></div>
        <div id="load-text">Initializing AI Model…</div>
        <div id="loader-sub" style="font-size:0.65rem;color:rgba(200,222,255,0.5);letter-spacing:0.1em;margin-top:12px;"></div>
      </div>
    </div>
  </div>

  <script type="module" src=".js/main.js"></script>

  <script>
    setTimeout(() => {
      const ls = document.getElementById('loading-screen');
      if (ls) { ls.style.opacity = '0'; setTimeout(() => ls.remove(), 600); }
    }, 9000);
  </script>

</body>
